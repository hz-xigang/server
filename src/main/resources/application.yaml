spring:
  jackson:
    default-property-inclusion: non_null
  application:
    name: xg
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=xg_wms;encrypt=false;trustServerCertificate=true;
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    username: sa
    password: root
server:
  port: 7100

jwt:
  secret: ${JWT_SECRET:change-this-jwt-secret-key-to-at-least-32-bytes}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
